
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;background:#0d0d0d;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;padding:40px 20px;position:relative;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
  background-size:50px 50px;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 20% 30%,rgba(212,169,106,0.07),transparent 60%);
}

.scene{perspective:1400px;cursor:pointer;user-select:none;}

.card{
  width:360px;height:510px;position:relative;transform-style:preserve-3d;
}
.card.idle-front{animation:idleFront 4s ease-in-out infinite;}
.card.idle-back{animation:idleBack 4s ease-in-out infinite;}
@keyframes idleFront{
  0%,100%{transform:rotateY(0deg) translateY(0px) rotateX(1deg);}
  50%{transform:rotateY(0deg) translateY(-10px) rotateX(-1deg);}
}
@keyframes idleBack{
  0%,100%{transform:rotateY(180deg) translateY(0px) rotateX(1deg);}
  50%{transform:rotateY(180deg) translateY(-10px) rotateX(-1deg);}
}
.card.spin-to-back{animation:spinBack 2.6s cubic-bezier(0.22,0.04,0.12,1) forwards;}
@keyframes spinBack{
  0%  {transform:rotateY(0deg)    translateY(0px)   scale(1);}
  6%  {transform:rotateY(120deg)  translateY(-14px) scale(1.02);}
  14% {transform:rotateY(360deg)  translateY(-34px) scale(1.06);}
  24% {transform:rotateY(720deg)  translateY(-46px) scale(1.08);}
  34% {transform:rotateY(1080deg) translateY(-42px) scale(1.07);}
  45% {transform:rotateY(1440deg) translateY(-30px) scale(1.05);}
  57% {transform:rotateY(1620deg) translateY(-18px) scale(1.03);}
  70% {transform:rotateY(1800deg) translateY(-10px) scale(1.01);}
  82% {transform:rotateY(1890deg) translateY(-4px)  scale(1);}
  91% {transform:rotateY(1944deg) translateY(-1px)  scale(1);}
  100%{transform:rotateY(1980deg) translateY(0px)   scale(1);}
}
.card.spin-to-front{animation:spinFront 2.6s cubic-bezier(0.22,0.04,0.12,1) forwards;}
@keyframes spinFront{
  0%  {transform:rotateY(1980deg) translateY(0px)   scale(1);}
  6%  {transform:rotateY(2100deg) translateY(-14px) scale(1.02);}
  14% {transform:rotateY(2340deg) translateY(-34px) scale(1.06);}
  24% {transform:rotateY(2700deg) translateY(-46px) scale(1.08);}
  34% {transform:rotateY(3060deg) translateY(-42px) scale(1.07);}
  45% {transform:rotateY(3420deg) translateY(-30px) scale(1.05);}
  57% {transform:rotateY(3600deg) translateY(-18px) scale(1.03);}
  70% {transform:rotateY(3780deg) translateY(-10px) scale(1.01);}
  82% {transform:rotateY(3870deg) translateY(-4px)  scale(1);}
  91% {transform:rotateY(3924deg) translateY(-1px)  scale(1);}
  100%{transform:rotateY(3960deg) translateY(0px)   scale(1);}
}

.face{
  position:absolute;inset:0;border-radius:20px;overflow:hidden;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  box-shadow:0 28px 70px rgba(0,0,0,0.65),0 8px 22px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.08);
}
.face-back{transform:rotateY(180deg);}

/* ── RECTO : CV PDF ── */
.face-front{background:#fff;}
.face-front img{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  display:block;
}
/* Effet bordure or autour du CV */

/* Coins dorés sur le CV */









/* ── VERSO : Starter Pack image ── */
.face-back-img{background:#000;position:relative;}
.face-back-img img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
.back-cta{
  position:absolute;bottom:0;left:0;right:0;
  padding:22px 16px 14px;
  background:linear-gradient(0deg,rgba(0,0,0,0.82),transparent);
  display:flex;justify-content:center;z-index:2;
}
.back-cta-btn{
  font-family:'DM Mono',monospace;
  font-size:8px;letter-spacing:.22em;text-transform:uppercase;
  color:#d4a96a;padding:6px 16px;
  border:1px solid rgba(212,169,106,0.5);
  border-radius:3px;background:rgba(0,0,0,0.4);cursor:pointer;
}

.hint{
  font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,0.2);margin-top:24px;
  animation:blink 2.5s ease-in-out infinite;
  position:relative;z-index:2;
}
@keyframes blink{0%,100%{opacity:.2;}50%{opacity:.6;}}

@keyframes ptFly{
  0%{transform:translate(0,0) scale(1);opacity:1;}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}
}
.pt{animation:ptFly var(--dur) ease-out forwards;position:fixed;border-radius:50%;pointer-events:none;z-index:9999;}
@keyframes ringOut{0%{width:0;height:0;opacity:.9;}100%{width:100px;height:100px;opacity:0;}}
.ring{position:fixed;border:2px solid #d4a96a;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);animation:ringOut .55s ease-out forwards;}
</style>

<script>
(function(){
  var scene=document.getElementById('scene');
  var card=document.getElementById('card');
  var phase='idle-front';
  var busy=false,clicks=0,timer=null;

  scene.addEventListener('click',function(e){
    clicks++;
    clearTimeout(timer);
    timer=setTimeout(function(){clicks=0;},360);
    if(clicks>=2){clicks=0;clearTimeout(timer);doFlip(e.clientX,e.clientY);}
  });

  function doFlip(x,y){
    if(busy)return;
    busy=true;
    burst(x,y);ring(x,y);
    if(phase==='idle-front'||phase==='spin-to-front'){
      setP('spin-to-back');
      setTimeout(function(){setP('idle-back');busy=false;},2600);
    }else{
      setP('spin-to-front');
      setTimeout(function(){setP('idle-front');busy=false;},2600);
    }
  }

  function setP(p){phase=p;card.className='card '+p;}

  function burst(x,y){
    var cols=['#d4a96a','#f5d490','#c06038','#f5f0e8','#a070e0','#fff0c8'];
    for(var i=0;i<20;i++){
      var a=(Math.PI*2*i/20)+(Math.random()-.5)*.6;
      var d=55+Math.random()*85;
      var el=document.createElement('div');
      el.className='pt';
      var s=4+Math.random()*6;
      el.style.cssText='left:'+x+'px;top:'+y+'px;width:'+s+'px;height:'+s+'px;background:'+cols[i%cols.length]+';--tx:'+(Math.cos(a)*d)+'px;--ty:'+(Math.sin(a)*d)+'px;--dur:'+(0.55+Math.random()*.45)+'s;';
      document.body.appendChild(el);
      el.addEventListener('animationend',function(){this.remove();});
    }
  }

  function ring(x,y){
    var r=document.createElement('div');
    r.className='ring';r.style.left=x+'px';r.style.top=y+'px';
    document.body.appendChild(r);
    r.addEventListener('animationend',function(){this.remove();});
  }
})();
</script>
